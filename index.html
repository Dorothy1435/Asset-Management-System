<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>자산관리 시스템</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="header">
    <div class="header-inner">
      <div>
        <h1>자산관리 시스템</h1>
        <p class="subtitle">글로컬대학사업본부 전체 자산 목록</p>
      </div>
      <div class="header-actions">
        <button class="btn btn-secondary" id="myReqBtn" hidden>
          내 신청 <span class="count-badge" id="myReqCount" hidden>0</span>
        </button>
        <button class="btn btn-secondary" id="reviewBtn" hidden>
          승인 대기 <span class="count-badge" id="pendingCount">0</span>
        </button>
        <button class="btn btn-secondary" id="histBtn" hidden>결재 내역</button>
        <button class="btn btn-secondary" id="membersBtn" hidden>회원 관리</button>
        <button class="btn btn-primary" id="addBtn">+ 자산 등록</button>
        <span class="admin-tag" id="userTag" hidden></span>
        <button class="btn btn-secondary" id="loginBtn">로그인</button>
        <button class="btn btn-secondary" id="signupBtn">회원가입</button>
        <button class="btn btn-secondary" id="logoutBtn" hidden>로그아웃</button>
      </div>
    </div>
  </header>

  <main class="container">
    <div class="notice" id="userNotice">
      자산 조회는 누구나 가능합니다. 등록·수정·삭제를 <b>요청</b>하려면 로그인하세요. (요청은 관리자 승인 후 반영)
    </div>

    <section class="stats" id="stats"></section>

    <section class="toolbar">
      <div class="search-box">
        <input type="text" id="searchInput" placeholder="자산명, 자산번호, 위치, 담당자, 부서, 제작사 검색..." autocomplete="off" />
        <button id="clearBtn" class="btn-clear" title="검색어 지우기">✕</button>
      </div>
      <button class="btn btn-secondary" id="advToggle">상세 필터</button>
      <button class="btn btn-secondary" id="exportBtn">📥 엑셀 다운로드</button>
      <span class="result-count" id="resultCount"></span>
    </section>

    <section class="adv-panel" id="advPanel" hidden>
      <div class="adv-field">
        <label>운영 부서</label>
        <select id="deptFilter"><option value="">전체</option></select>
      </div>
      <div class="adv-field">
        <label>상태</label>
        <select id="statusFilter"><option value="">전체</option></select>
      </div>
      <div class="adv-field">
        <label>취득금액(원)</label>
        <div class="range-row">
          <input type="number" id="minCost" placeholder="최소" min="0" />
          <span>~</span>
          <input type="number" id="maxCost" placeholder="최대" min="0" />
        </div>
      </div>
      <button class="btn btn-secondary" id="advReset">필터 초기화</button>
    </section>

    <section class="table-wrap">
      <table class="asset-table">
        <thead>
          <tr>
            <th class="sortable" data-key="assetName">자산명 <span class="sort-arrow"></span></th>
            <th class="sortable" data-key="assetNumber">자산번호 <span class="sort-arrow"></span></th>
            <th>라벨</th>
            <th class="sortable" data-key="location">위치 <span class="sort-arrow"></span></th>
            <th class="sortable" data-key="manager">담당자 <span class="sort-arrow"></span></th>
            <th class="sortable" data-key="dept">부서 <span class="sort-arrow"></span></th>
            <th class="sortable" data-key="status">상태 <span class="sort-arrow"></span></th>
            <th class="sortable" data-key="regDate">등재일 <span class="sort-arrow"></span></th>
            <th>관리</th>
          </tr>
        </thead>
        <tbody id="assetTbody"></tbody>
      </table>
      <div id="emptyMsg" class="empty-msg" hidden>검색 결과가 없습니다.</div>
    </section>

    <nav class="pagination" id="pagination"></nav>
  </main>

  <!-- 상세 모달 -->
  <div class="modal-overlay" id="detailOverlay" hidden>
    <div class="modal" role="dialog" aria-modal="true">
      <div class="modal-header">
        <h2 id="detailTitle">자산 상세 정보</h2>
        <button class="modal-close" data-close>✕</button>
      </div>
      <div class="modal-body" id="detailBody"></div>
      <div class="modal-footer">
        <button class="btn btn-secondary" id="detailLabelBtn" hidden>라벨 파일 다운로드</button>
        <button class="btn btn-secondary" id="detailDownloadBtn" hidden>사진 다운로드</button>
        <button class="btn btn-inspect" id="detailInspectBtn">검수</button>
        <button class="btn btn-primary" id="detailEditBtn">수정</button>
        <button class="btn btn-danger" id="detailDeleteBtn">삭제</button>
        <button class="btn btn-secondary" data-close>목록으로 돌아가기</button>
      </div>
    </div>
  </div>

  <!-- 등록/수정 폼 모달 -->
  <div class="modal-overlay" id="formOverlay" hidden>
    <div class="modal" role="dialog" aria-modal="true">
      <div class="modal-header">
        <h2 id="formTitle">자산 등록</h2>
        <button class="modal-close" data-close>✕</button>
      </div>
      <form id="assetForm" class="modal-body">
        <input type="hidden" id="f-id" />
        <div class="form-grid">
          <div class="form-row">
            <label>자산명 <span class="req">*</span></label>
            <input type="text" id="f-assetName" required />
          </div>
          <div class="form-row">
            <label>자산번호 <span class="req">*</span></label>
            <input type="text" id="f-assetNumber" required />
          </div>
          <div class="form-row">
            <label>라벨스티커</label>
            <input type="text" id="f-labelSticker" placeholder="예: A-001" />
          </div>
          <div class="form-row full">
            <label>라벨 파일</label>
            <input type="file" id="f-labelFile" accept=".pdf,image/*" />
            <div class="label-file-info" id="labelFileInfo"><span class="photo-placeholder">파일 없음</span></div>
            <button type="button" class="btn-link" id="removeLabelFileBtn" hidden>파일 제거</button>
          </div>
          <div class="form-row">
            <label>상태</label>
            <select id="f-status">
              <option value="취득">취득</option>
              <option value="사용중">사용중</option>
              <option value="보관중">보관중</option>
              <option value="불용">불용</option>
              <option value="폐기">폐기</option>
            </select>
          </div>
          <div class="form-row full">
            <label>보관 위치 <span class="req">*</span></label>
            <input type="text" id="f-location" required />
          </div>
          <div class="form-row">
            <label>담당자 <span class="req">*</span></label>
            <input type="text" id="f-manager" required />
          </div>
          <div class="form-row">
            <label>운영 부서</label>
            <input type="text" id="f-dept" />
          </div>
          <div class="form-row">
            <label>모델명</label>
            <input type="text" id="f-model" />
          </div>
          <div class="form-row">
            <label>규격</label>
            <input type="text" id="f-spec" />
          </div>
          <div class="form-row">
            <label>제작회사</label>
            <input type="text" id="f-maker" />
          </div>
          <div class="form-row">
            <label>취득금액(원)</label>
            <input type="number" id="f-acquireCost" min="0" />
          </div>
          <div class="form-row full">
            <label>비고</label>
            <textarea id="f-note" rows="2"></textarea>
          </div>
          <div class="form-row full">
            <label>물품 사진</label>
            <input type="file" id="f-image" accept="image/*" />
            <div class="photo-preview" id="photoPreview"><span class="photo-placeholder">사진 없음</span></div>
            <button type="button" class="btn-link" id="removePhotoBtn" hidden>사진 제거</button>
          </div>
          <div class="form-row request-only">
            <label>신청자 이름</label>
            <input type="text" id="f-requester" placeholder="승인 검토용 (선택)" />
          </div>
          <div class="form-row request-only">
            <label>요청 사유</label>
            <input type="text" id="f-reqnote" placeholder="예: 위치 이전, 폐기 등 (선택)" />
          </div>
        </div>
        <p class="form-error" id="formError" hidden></p>
      </form>
      <div class="modal-footer">
        <button class="btn btn-primary" id="formSaveBtn">등록</button>
        <button class="btn btn-secondary" data-close>취소</button>
      </div>
    </div>
  </div>

  <!-- 삭제 요청 모달 -->
  <div class="modal-overlay" id="delReqOverlay" hidden>
    <div class="modal modal-narrow" role="dialog" aria-modal="true">
      <div class="modal-header">
        <h2>삭제 요청</h2>
        <button class="modal-close" data-close>✕</button>
      </div>
      <form id="delReqForm" class="modal-body">
        <p class="del-target" id="delReqTarget"></p>
        <div class="form-row" style="margin-bottom:12px;">
          <label>신청자 이름</label>
          <input type="text" id="dr-requester" placeholder="승인 검토용 (선택)" />
        </div>
        <div class="form-row">
          <label>삭제 사유</label>
          <input type="text" id="dr-note" placeholder="예: 파손, 불용 처리 등 (선택)" />
        </div>
      </form>
      <div class="modal-footer">
        <button class="btn btn-danger" id="delReqSubmit">삭제 요청</button>
        <button class="btn btn-secondary" data-close>취소</button>
      </div>
    </div>
  </div>

  <!-- 로그인 / 회원가입 모달 -->
  <div class="modal-overlay" id="authOverlay" hidden>
    <div class="modal modal-narrow" role="dialog" aria-modal="true">
      <div class="modal-header">
        <h2 id="authTitle">로그인</h2>
        <button class="modal-close" data-close>✕</button>
      </div>
      <form id="authForm" class="modal-body">
        <div class="form-row" style="margin-bottom:12px;">
          <label>아이디</label>
          <div class="id-field">
            <input type="text" id="authId" autocomplete="username" placeholder="아이디" required />
            <span class="id-suffix">@inje.ac.kr</span>
          </div>
        </div>
        <div class="form-row signup-only" style="margin-bottom:12px;">
          <label>이름</label>
          <input type="text" id="authName" autocomplete="name" placeholder="예: 홍길동" />
        </div>
        <div class="form-row signup-only" style="margin-bottom:12px;">
          <label>소속</label>
          <input type="text" id="authAffil" autocomplete="organization" placeholder="예: 글로컬대학사업본부" />
        </div>
        <div class="form-row">
          <label>비밀번호</label>
          <input type="password" id="authPw" autocomplete="current-password" required />
        </div>
        <p class="form-error" id="authError" hidden></p>
        <p class="form-info" id="authInfo" hidden></p>
        <button type="button" class="btn-link" id="forgotBtn" style="margin-top:12px;">비밀번호를 잊으셨나요?</button>
        <button type="submit" class="hidden-submit" tabindex="-1" aria-hidden="true"></button>
      </form>
      <div class="modal-footer" style="justify-content:space-between;">
        <button class="btn-link" id="authSwitch">회원가입으로 →</button>
        <span class="footer-btns">
          <button class="btn btn-primary" id="authSubmit">로그인</button>
          <button class="btn btn-secondary" data-close>취소</button>
        </span>
      </div>
    </div>
  </div>

  <!-- 새 비밀번호 설정 모달 -->
  <div class="modal-overlay" id="pwOverlay" hidden>
    <div class="modal modal-narrow" role="dialog" aria-modal="true">
      <div class="modal-header"><h2>새 비밀번호 설정</h2></div>
      <form id="pwForm" class="modal-body">
        <div class="form-row">
          <label>새 비밀번호 (6자 이상)</label>
          <input type="password" id="newPassword" autocomplete="new-password" minlength="6" required />
        </div>
        <p class="form-error" id="pwError" hidden></p>
      </form>
      <div class="modal-footer">
        <button class="btn btn-primary" id="pwSubmit">비밀번호 변경</button>
      </div>
    </div>
  </div>

  <!-- 내 신청 내역 모달 (사용자) -->
  <div class="modal-overlay" id="myReqOverlay" hidden>
    <div class="modal modal-wide" role="dialog" aria-modal="true">
      <div class="modal-header">
        <h2>내 신청 내역</h2>
        <button class="modal-close" data-close>✕</button>
      </div>
      <div class="modal-body" id="myReqBody"></div>
      <div class="modal-footer"><button class="btn btn-secondary" data-close>닫기</button></div>
    </div>
  </div>

  <!-- 승인 대기 모달 (관리자) -->
  <div class="modal-overlay" id="reviewOverlay" hidden>
    <div class="modal modal-wide" role="dialog" aria-modal="true">
      <div class="modal-header">
        <h2>승인 대기 목록</h2>
        <button class="modal-close" data-close>✕</button>
      </div>
      <div class="modal-body" id="reviewBody"></div>
      <div class="modal-footer"><button class="btn btn-secondary" data-close>닫기</button></div>
    </div>
  </div>

  <!-- 결재/변경 이력 모달 (관리자) -->
  <div class="modal-overlay" id="histOverlay" hidden>
    <div class="modal modal-wide" role="dialog" aria-modal="true">
      <div class="modal-header">
        <h2>결재 / 변경 이력</h2>
        <button class="modal-close" data-close>✕</button>
      </div>
      <div class="modal-body">
        <input type="text" id="histSearch" class="hist-search" placeholder="자산명 또는 자산번호로 검색..." autocomplete="off" />
        <div id="histBody"></div>
      </div>
      <div class="modal-footer"><button class="btn btn-secondary" data-close>닫기</button></div>
    </div>
  </div>

  <!-- 회원 관리 모달 (관리자) -->
  <div class="modal-overlay" id="membersOverlay" hidden>
    <div class="modal modal-wide" role="dialog" aria-modal="true">
      <div class="modal-header">
        <h2>회원 관리</h2>
        <button class="modal-close" data-close>✕</button>
      </div>
      <div class="modal-body" id="membersBody"></div>
      <div class="modal-footer"><button class="btn btn-secondary" data-close>닫기</button></div>
    </div>
  </div>

  <!-- 검수 확인 모달 -->
  <div class="modal-overlay" id="inspectOverlay" hidden>
    <div class="modal modal-narrow" role="dialog" aria-modal="true">
      <div class="modal-header">
        <h2 id="inspectTitle">검수 확인</h2>
        <button class="modal-close" data-close>✕</button>
      </div>
      <form id="inspectForm" class="modal-body">
        <p class="del-target" id="inspectTarget"></p>
        <div class="form-row" style="margin-bottom:12px;">
          <label>검수 구분</label>
          <div class="insp-period">
            <select id="insp-type">
              <option value="분기">분기별</option>
              <option value="회차">회차별</option>
            </select>
            <input type="text" id="insp-period" placeholder="예: 2026 1분기 / 3회차" />
          </div>
        </div>
        <div class="form-row" style="margin-bottom:12px;">
          <label>검수 확인자 이름</label>
          <input type="text" id="insp-inspector" placeholder="예: 홍길동" />
        </div>
        <div class="form-row" style="margin-bottom:12px;">
          <label>소속</label>
          <input type="text" id="insp-affil" placeholder="예: 글로컬대학사업본부" />
        </div>
        <label class="insp-check"><input type="checkbox" id="insp-checked" checked /> 검수 완료를 확인합니다 ✔</label>
        <p class="form-error" id="inspectError" hidden></p>
        <p class="form-info insp-note" id="inspectNote">검수는 관리자 승인 후 기록에 반영됩니다.</p>
      </form>
      <div class="modal-footer">
        <button class="btn btn-primary" id="inspectSubmit">검수 확인</button>
        <button class="btn btn-secondary" data-close>취소</button>
      </div>
    </div>
  </div>

  <!-- 사진 확대 라이트박스 -->
  <div class="lightbox" id="lightbox" hidden>
    <img id="lightboxImg" src="" alt="확대 이미지" />
  </div>

  <footer class="footer">
    <p>© 글로컬대학사업본부 자산관리 시스템</p>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="script.js"></script>
</body>
</html>
